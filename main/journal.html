<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=https://ichingandcivilization.org/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>期刊已迁移 | 易經文明</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f0e5;
        --ink: #111a20;
        --accent: #9f6a34;
        --line: rgba(17, 26, 32, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
          radial-gradient(circle at top, rgba(159, 106, 52, 0.12), transparent 34%),
          var(--bg);
        color: var(--ink);
        font-family: "Noto Serif SC", "Source Han Serif SC", serif;
      }

      .card {
        width: min(100%, 42rem);
        padding: 2rem;
        border: 1px solid var(--line);
        border-radius: 1.5rem;
        background: rgba(255, 251, 245, 0.96);
        box-shadow: 0 24px 60px rgba(17, 26, 32, 0.1);
      }

      h1 {
        margin: 0 0 0.9rem;
        font-size: clamp(2rem, 4vw, 3.2rem);
        line-height: 1;
      }

      p {
        margin: 0.8rem 0 0;
        font-size: 1.02rem;
        line-height: 1.75;
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>期刊已迁移</h1>
      <p>《易經與文明》期刊网站现已独立，正在跳转到新站：</p>
      <p><a href="https://ichingandcivilization.org/">https://ichingandcivilization.org/</a></p>
      <p>The journal has moved to its standalone site. If redirect does not start automatically, use the link above.</p>
      <script>
        window.location.replace("https://ichingandcivilization.org/");
      </script>
    </main>
  </body>
</html>
